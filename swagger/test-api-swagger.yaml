openapi: 3.0.0
info:
  title: Simple API
  description: Basic API with a single GET / endpoint
  version: 1.0.0

paths:
  /:
    get:
      summary: Returns a simple message
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Hello, world!